<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя 💗</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --pink:#ff4d94;
  --rose:#ff1a6e;
  --soft:#ffe0ef;
  --glow:rgba(255,77,148,0.6);
}

html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif}

body{
  background:#0a0005;
  color:#fff;
  cursor:none;
}

/* ===== CUSTOM CURSOR ===== */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  font-size:22px;transform:translate(-50%,-50%);
  transition:transform .1s;
  filter:drop-shadow(0 0 6px #ff4d94);
}

/* ===== CANVAS ===== */
canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:0}

/* ===== SCREENS ===== */
.screen{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  z-index:10;
  opacity:0;pointer-events:none;
  transition:opacity .8s ease;
}
.screen.active{opacity:1;pointer-events:all}

/* ===== GLASS CARD ===== */
.card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,100,170,0.3);
  border-radius:32px;
  padding:50px 55px;
  text-align:center;
  max-width:480px;width:90%;
  box-shadow:0 0 60px rgba(255,77,148,0.3),0 0 120px rgba(255,77,148,0.1),inset 0 1px 0 rgba(255,255,255,0.15);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top,rgba(255,100,170,0.12),transparent 70%);
  pointer-events:none;
}

/* ===== TYPOGRAPHY ===== */
h1{
  font-family:'Great Vibes',cursive;
  font-size:58px;line-height:1.1;
  color:#fff;
  text-shadow:0 0 20px var(--pink),0 0 60px var(--pink);
  margin-bottom:16px;
  animation:textglow 2s ease-in-out infinite alternate;
}
@keyframes textglow{
  from{text-shadow:0 0 20px var(--pink),0 0 40px var(--pink);}
  to{text-shadow:0 0 30px #ff80bd,0 0 80px var(--pink),0 0 120px rgba(255,77,148,0.4);}
}

p.subtitle{
  font-size:17px;font-weight:300;
  color:rgba(255,255,255,0.85);
  line-height:1.7;margin-bottom:28px;
  min-height:28px;
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-block;
  border:none;padding:15px 38px;margin:8px;
  border-radius:50px;
  background:linear-gradient(135deg,#ff4d94,#c2185b);
  color:#fff;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:700;
  cursor:none;
  box-shadow:0 0 25px rgba(255,77,148,0.6),0 4px 20px rgba(0,0,0,0.3);
  transition:transform .25s,box-shadow .25s;
  position:relative;overflow:hidden;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  pointer-events:none;
}
.btn:hover{
  transform:scale(1.1) translateY(-2px);
  box-shadow:0 0 40px rgba(255,77,148,0.9),0 8px 30px rgba(0,0,0,0.3);
}
.btn:active{transform:scale(0.97)}

#btnNo{
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 10px rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  position:absolute;
  transition:top .3s ease,left .3s ease;
}
#btnNo:hover{
  transform:scale(1.0);
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* ===== HEART PULSE ===== */
.big-heart{
  font-size:80px;
  display:block;margin:10px auto 20px;
  animation:heartbeat 1.2s ease-in-out infinite;
  filter:drop-shadow(0 0 15px #ff4d94);
}
@keyframes heartbeat{
  0%{transform:scale(1)}
  14%{transform:scale(1.35)}
  28%{transform:scale(1)}
  42%{transform:scale(1.2)}
  70%{transform:scale(1)}
}

/* ===== PROGRESS DOTS ===== */
.dots{
  display:flex;justify-content:center;gap:10px;
  margin-bottom:28px;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:background .4s,transform .4s;
}
.dot.done{
  background:var(--pink);
  box-shadow:0 0 10px var(--pink);
  transform:scale(1.2);
}

/* ===== YES SCREEN ===== */
#sYes .card{
  border-color:rgba(255,200,220,0.5);
  box-shadow:0 0 80px rgba(255,77,148,0.5),0 0 200px rgba(255,77,148,0.2);
}
.yes-emoji{font-size:60px;display:block;margin-bottom:16px;animation:spin 1s ease-out;}
@keyframes spin{from{transform:rotate(-30deg) scale(0)}to{transform:rotate(0) scale(1)}}

/* ===== PHOTO PLACEHOLDER (котики/мишка) ===== */
.bear{
  font-size:90px;
  display:block;margin:0 auto 10px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,100,170,0.6));
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* ===== RIBBON ===== */
.ribbon{
  position:absolute;top:-1px;right:28px;
  background:linear-gradient(135deg,#ff4d94,#c2185b);
  color:#fff;font-size:12px;font-weight:700;
  padding:6px 18px 10px;
  clip-path:polygon(0 0,100% 0,100% 80%,50% 100%,0 80%);
  letter-spacing:1px;
  box-shadow:0 4px 15px rgba(255,77,148,0.5);
}

/* ===== STICKER HEARTS ===== */
.sticker{
  position:absolute;font-size:26px;
  animation:stickerFloat 4s ease-in-out infinite;
  opacity:0.7;
}
.sticker:nth-child(1){top:12px;left:18px;animation-delay:0s}
.sticker:nth-child(2){top:16px;right:70px;animation-delay:.7s}
.sticker:nth-child(3){bottom:18px;left:22px;animation-delay:1.4s}
.sticker:nth-child(4){bottom:14px;right:18px;animation-delay:2.1s}
@keyframes stickerFloat{
  0%,100%{transform:translateY(0) rotate(-10deg)}
  50%{transform:translateY(-8px) rotate(10deg)}
}

/* ===== FADE OVERLAY ===== */
#fadeOverlay{
  position:fixed;inset:0;background:#0a0005;
  z-index:100;pointer-events:none;
  transition:opacity 0.7s ease;
}
</style>
</head>
<body>

<div id="cursor">💗</div>
<div id="fadeOverlay"></div>
<canvas id="bg"></canvas>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <div class="ribbon">ТОЛЬКО ДЛЯ ТЕБЯ</div>
    <span class="sticker">🌸</span>
    <span class="sticker">✨</span>
    <span class="sticker">🎀</span>
    <span class="sticker">💫</span>
    <div class="dots"><div class="dot done"></div><div class="dot"></div><div class="dot"></div></div>
    <h1>Привет 💗</h1>
    <p class="subtitle" id="typeText"></p>
    <button class="btn" onclick="goTo(1,2)">Открыть письмо 💌</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <div class="card">
    <span class="sticker">🌷</span>
    <span class="sticker">💕</span>
    <span class="sticker">🌙</span>
    <span class="sticker">⭐</span>
    <div class="dots"><div class="dot done"></div><div class="dot done"></div><div class="dot"></div></div>
    <h1>Ты моя вселенная</h1>
    <span class="big-heart">💖</span>
    <p class="subtitle">Когда ты рядом — мир становится<br>теплее, ярче и красивее...</p>
    <button class="btn" onclick="goTo(2,3)">Дальше 👉</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <div class="card" style="padding-bottom:80px">
    <span class="sticker">💝</span>
    <span class="sticker">🌹</span>
    <span class="sticker">🦋</span>
    <span class="sticker">✨</span>
    <div class="dots"><div class="dot done"></div><div class="dot done"></div><div class="dot done"></div></div>
    <span class="bear">🐻</span>
    <h1>Я люблю тебя</h1>
    <p class="subtitle">Ты любишь меня? ❤️</p>
    <div style="position:relative;height:60px">
      <button class="btn" onclick="goYes()">Да, конечно! 💗</button>
      <button class="btn" id="btnNo" onmouseenter="runAway()" onclick="runAway()">Нет 😅</button>
    </div>
  </div>
</div>

<!-- YES SCREEN -->
<div class="screen" id="sYes">
  <div class="card">
    <span class="sticker">🥳</span>
    <span class="sticker">🎊</span>
    <span class="sticker">💍</span>
    <span class="sticker">🌺</span>
    <span class="yes-emoji">🎉</span>
    <h1>Ты лучшее,<br>что со мной случилось</h1>
    <p class="subtitle" style="margin-top:12px">Теперь мы вместе навсегда 💗<br>Я самый счастливый человек на свете</p>
    <span class="big-heart">❤️</span>
  </div>
</div>

<audio id="music" loop preload="none">
  <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<script>
/* ===== CURSOR ===== */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{
  cur.style.left = e.clientX+'px';
  cur.style.top = e.clientY+'px';
});
document.addEventListener('mousedown',()=>cur.style.transform='translate(-50%,-50%) scale(1.5)');
document.addEventListener('mouseup',()=>cur.style.transform='translate(-50%,-50%) scale(1)');

/* ===== TYPEWRITER ===== */
const msg = "Я сделал это специально для тебя... С любовью, твой Котик ❤️";
let ti=0;
(function type(){
  if(ti<msg.length){
    document.getElementById('typeText').textContent+=msg[ti++];
    setTimeout(type,45);
  }
})();

/* ===== SCREEN TRANSITIONS ===== */
const overlay = document.getElementById('fadeOverlay');
overlay.style.opacity='0';

function goTo(from,to){
  overlay.style.opacity='1';
  setTimeout(()=>{
    document.getElementById('s'+from).classList.remove('active');
    const next = to==='yes'?document.getElementById('sYes'):document.getElementById('s'+to);
    next.classList.add('active');
    overlay.style.opacity='0';
    if(to===3) tryMusic();
  },600);
}

function goYes(){
  goTo(3,'yes');
  launchFirework();
}

function tryMusic(){
  const m=document.getElementById('music');
  m.volume=0.4;
  m.play().catch(()=>{});
}

/* ===== BUTTON RUN AWAY ===== */
function runAway(){
  const btn=document.getElementById('btnNo');
  const card=btn.closest('.card');
  const cw=card.offsetWidth-120, ch=card.offsetHeight-60;
  btn.style.top=Math.random()*Math.max(10,ch)+'px';
  btn.style.left=Math.random()*Math.max(10,cw)+'px';
}

/* ===== PARTICLE CANVAS ===== */
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();
window.addEventListener('resize',resize);

const HEARTS=['💗','💖','💕','✨','🌸','⭐','💫'];
let particles=[];

for(let i=0;i<70;i++) spawnP(true);

function spawnP(random){
  particles.push({
    x: random?Math.random()*canvas.width:Math.random()*canvas.width,
    y: random?Math.random()*canvas.height:canvas.height+20,
    emoji: HEARTS[Math.floor(Math.random()*HEARTS.length)],
    size: Math.random()*16+8,
    speed: Math.random()*0.8+0.3,
    drift: (Math.random()-0.5)*0.5,
    alpha: Math.random()*0.5+0.3,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.02
  });
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.y>-30);
  while(particles.length<70) spawnP(false);
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.alpha;
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.font=p.size+'px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(p.emoji,0,0);
    ctx.restore();
    p.y-=p.speed;
    p.x+=p.drift;
    p.rot+=p.rotSpeed;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ===== CLICK BURST ===== */
document.addEventListener('click',e=>{
  for(let i=0;i<6;i++){
    const span=document.createElement('div');
    span.textContent=['💗','💖','💕','✨'][Math.floor(Math.random()*4)];
    span.style.cssText=`
      position:fixed;left:${e.clientX}px;top:${e.clientY}px;
      font-size:${18+Math.random()*14}px;
      pointer-events:none;z-index:9998;
      transform:translate(-50%,-50%);
      animation:burst .8s ease-out forwards;
      --dx:${(Math.random()-0.5)*120}px;
      --dy:${-(Math.random()*80+30)}px;
    `;
    document.body.appendChild(span);
    span.addEventListener('animationend',()=>span.remove());
  }
});

/* ===== FIREWORK ===== */
function launchFirework(){
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    const angle=Math.random()*Math.PI*2;
    const dist=100+Math.random()*200;
    p.textContent=['🎊','💗','✨','🌸','💕'][Math.floor(Math.random()*5)];
    p.style.cssText=`
      position:fixed;
      left:50%;top:50%;
      font-size:${14+Math.random()*20}px;
      pointer-events:none;z-index:9998;
      transform:translate(-50%,-50%);
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      animation:burst 1.2s ease-out forwards;
      animation-delay:${Math.random()*0.5}s;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

/* burst keyframe via style tag */
const style=document.createElement('style');
style.textContent=`
@keyframes burst{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0.3)}
}`;
document.head.appendChild(style);
</script>
</body>
</html>
